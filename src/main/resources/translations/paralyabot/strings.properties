plugins.reload.argument.new-plugin-path.name=nouveau-plugin
plugins.reload.argument.new-plugin-path.description=Le fichier zip du nouveau plugin.
plugins.reload.response.success.embed.title=Plugin {0} rechargé avec succès !
plugins.reload.response.success.embed.description=Le plugin {0} a bien été rechargé et remplacé par le plugin situé à {1}
