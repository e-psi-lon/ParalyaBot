name: Build Docker image
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@main
      - name: Setup Nix caching
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Connect to Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix develop --command bash -c '
            echo "PARALYABOT_VERSION=$PARALYABOT_VERSION" >> $GITHUB_ENV
            build-bot
          '

      - name: Tag and push image
        run: |
          docker tag paralyabot:latest ghcr.io/e-psi-lon/paralyabot:$PARALYABOT_VERSION
          docker tag paralyabot:latest ghcr.io/e-psi-lon/paralyabot:latest
          docker push ghcr.io/e-psi-lon/paralyabot:$PARALYABOT_VERSION
          docker push ghcr.io/e-psi-lon/paralyabot:latest
